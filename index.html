<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoDesafio — Onde no Mundo?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --c-bg: #0a0e1a;
    --c-surface: #111827;
    --c-surface2: #1c2537;
    --c-border: rgba(255,255,255,0.1);
    --c-gold: #f5c842;
    --c-gold2: #e8a020;
    --c-teal: #22d3b8;
    --c-red: #ef4444;
    --c-text: #f1f5f9;
    --c-muted: #94a3b8;
    --c-correct: #22c55e;
    --font-display: 'Georgia', serif;
    --font-body: system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--c-bg);
    color: var(--c-text);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow: hidden;
  }

  /* ── TELA INICIAL ── */
  #screen-setup {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; padding: 2rem; gap: 2rem;
  }
  .logo {
    text-align: center;
  }
  .logo h1 {
    font-family: var(--font-display);
    font-size: clamp(2rem, 5vw, 3.5rem);
    color: var(--c-gold);
    letter-spacing: 0.05em;
    text-shadow: 0 0 40px rgba(245,200,66,0.3);
  }
  .logo p { color: var(--c-muted); margin-top: 0.5rem; font-size: 1rem; }

  .globe-anim {
    width: 80px; height: 80px; margin: 0 auto 1rem;
    border: 3px solid var(--c-gold);
    border-radius: 50%;
    position: relative;
    animation: spin 8s linear infinite;
    box-shadow: 0 0 30px rgba(245,200,66,0.2);
  }
  .globe-anim::before {
    content: '🌍';
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    font-size: 40px;
    animation: spin-rev 8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes spin-rev { to { transform: rotate(-360deg); } }

  .setup-card {
    background: var(--c-surface);
    border: 1px solid var(--c-border);
    border-radius: 16px;
    padding: 2rem;
    width: 100%;
    max-width: 600px;
  }
  .setup-card h2 {
    font-size: 1rem; color: var(--c-gold); text-transform: uppercase;
    letter-spacing: 0.1em; margin-bottom: 1.25rem;
  }
  .groups-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;
  }
  .group-input-wrap {
    display: flex; flex-direction: column; gap: 4px;
  }
  .group-input-wrap label {
    font-size: 11px; color: var(--c-muted); text-transform: uppercase; letter-spacing: 0.08em;
  }
  .group-input-wrap input {
    background: var(--c-surface2); border: 1px solid var(--c-border);
    border-radius: 8px; padding: 8px 12px; color: var(--c-text);
    font-size: 14px; outline: none; transition: border-color 0.2s;
  }
  .group-input-wrap input:focus { border-color: var(--c-gold); }
  .group-input-wrap input::placeholder { color: var(--c-muted); }

  .btn-start {
    background: var(--c-gold);
    color: #0a0e1a;
    border: none; border-radius: 10px;
    padding: 14px 40px;
    font-size: 1.1rem; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
    letter-spacing: 0.05em;
    box-shadow: 0 0 20px rgba(245,200,66,0.3);
  }
  .btn-start:hover { background: var(--c-gold2); transform: translateY(-1px); box-shadow: 0 0 30px rgba(245,200,66,0.5); }
  .btn-start:active { transform: translateY(0); }

  /* ── TELA DO JOGO ── */
  #screen-game {
    display: none; position: fixed; inset: 0; background: #000;
  }
  #sv-container {
    position: absolute; inset: 0;
  }
  #sv-container iframe {
    width: 100%; height: 100%; border: none;
  }

  /* HUD topo */
  #hud-top {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 12px 20px;
    display: flex; align-items: center; gap: 16px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
    pointer-events: none;
  }
  .hud-pill {
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 13px; color: var(--c-text);
    backdrop-filter: blur(8px);
    pointer-events: auto;
  }
  .hud-pill strong { color: var(--c-gold); }
  #timer-pill {
    font-size: 20px; font-weight: 700;
    font-variant-numeric: tabular-nums;
    min-width: 70px; text-align: center;
    transition: color 0.3s;
  }
  #timer-pill.urgent { color: var(--c-red) !important; }
  #round-info { flex: 1; }
  #scores-pill { cursor: pointer; }

  /* MINIMAPA */
  #minimap-wrap {
    position: absolute; bottom: 20px; right: 20px;
    width: 200px; height: 150px;
    transition: all 0.3s ease;
    border-radius: 12px; overflow: hidden;
    border: 2px solid rgba(255,255,255,0.2);
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    cursor: crosshair;
    z-index: 100;
  }
  #minimap-wrap:hover, #minimap-wrap.expanded {
    width: 360px; height: 280px;
  }
  #minimap { width: 100%; height: 100%; }

  #confirm-btn {
    position: absolute; bottom: 20px; right: 232px;
    background: var(--c-gold); color: #000;
    border: none; border-radius: 10px;
    padding: 12px 24px; font-size: 15px; font-weight: 700;
    cursor: pointer; z-index: 100;
    transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(245,200,66,0.4);
    display: none;
  }
  #confirm-btn:hover { background: var(--c-gold2); transform: scale(1.03); }

  #minimap-hint {
    position: absolute; bottom: 180px; right: 20px;
    background: rgba(0,0,0,0.7); color: var(--c-muted);
    font-size: 11px; padding: 4px 10px; border-radius: 6px;
    pointer-events: none; z-index: 101; white-space: nowrap;
    transition: opacity 0.3s;
  }

  /* ── TELA DE RESULTADO DO ROUND ── */
  #screen-result {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.85); backdrop-filter: blur(6px);
    z-index: 200; align-items: center; justify-content: center;
  }
  .result-card {
    background: var(--c-surface);
    border: 1px solid var(--c-border);
    border-radius: 20px; padding: 2.5rem;
    width: min(500px, 90vw);
    text-align: center;
  }
  .result-location-name {
    font-family: var(--font-display);
    font-size: 1.6rem; color: var(--c-gold); margin-bottom: 0.5rem;
  }
  .result-country { color: var(--c-muted); font-size: 1rem; margin-bottom: 1.5rem; }
  #result-map-mini { height: 200px; border-radius: 12px; margin-bottom: 1.5rem; overflow: hidden; }
  .result-groups-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 0.75rem; margin-bottom: 1.5rem;
  }
  .result-group-card {
    background: var(--c-surface2);
    border-radius: 10px; padding: 10px;
    border: 1px solid var(--c-border);
  }
  .result-group-card.winner { border-color: var(--c-gold); background: rgba(245,200,66,0.08); }
  .result-group-name { font-size: 12px; color: var(--c-muted); margin-bottom: 4px; }
  .result-group-dist { font-size: 18px; font-weight: 700; color: var(--c-text); }
  .result-group-card.winner .result-group-dist { color: var(--c-gold); }
  .result-group-pts { font-size: 11px; color: var(--c-teal); margin-top: 2px; }
  .no-guess { font-size: 12px; color: var(--c-red); }

  .btn-next {
    background: var(--c-teal); color: #000;
    border: none; border-radius: 10px;
    padding: 12px 36px; font-size: 1rem; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-next:hover { opacity: 0.85; transform: translateY(-1px); }

  /* ── TELA FINAL ── */
  #screen-final {
    display: none; position: fixed; inset: 0;
    background: var(--c-bg);
    z-index: 300; overflow-y: auto;
    align-items: center; justify-content: center; flex-direction: column;
    padding: 2rem;
  }
  #screen-final h1 {
    font-family: var(--font-display);
    color: var(--c-gold); font-size: 2.5rem; margin-bottom: 0.5rem;
    text-align: center;
  }
  #screen-final p.subtitle { color: var(--c-muted); text-align: center; margin-bottom: 2rem; }
  .podium {
    width: min(500px, 90vw);
    display: flex; flex-direction: column; gap: 12px; margin-bottom: 2rem;
  }
  .podium-row {
    background: var(--c-surface);
    border: 1px solid var(--c-border);
    border-radius: 14px; padding: 16px 20px;
    display: flex; align-items: center; gap: 16px;
  }
  .podium-row.gold { border-color: var(--c-gold); background: rgba(245,200,66,0.08); }
  .podium-row.silver { border-color: #94a3b8; }
  .podium-row.bronze { border-color: #b87333; }
  .podium-rank { font-size: 1.5rem; min-width: 32px; }
  .podium-name { flex: 1; font-size: 1rem; font-weight: 600; }
  .podium-total { font-size: 1.3rem; font-weight: 700; color: var(--c-gold); }
  .podium-unit { font-size: 11px; color: var(--c-muted); }
  .btn-restart {
    background: transparent; border: 1px solid var(--c-gold);
    color: var(--c-gold); border-radius: 10px;
    padding: 12px 36px; font-size: 1rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-restart:hover { background: rgba(245,200,66,0.1); }

  /* Leaflet override */
  .leaflet-container { background: #1a2035; }
  .leaflet-tile { filter: hue-rotate(180deg) invert(1) brightness(0.85); }
</style>
</head>
<body>

<!-- ══ TELA SETUP ══ -->
<div id="screen-setup">
  <div class="logo">
    <div class="globe-anim"></div>
    <h1>GeoDesafio</h1>
    <p>Onde no mundo está esse lugar?</p>
  </div>
  <div class="setup-card">
    <h2>Nome dos grupos</h2>
    <div class="groups-grid" id="groups-grid">
      <!-- gerado por JS -->
    </div>
  </div>
  <button class="btn-start" onclick="startGame()">▶ Iniciar Jogo</button>
</div>

<!-- ══ TELA JOGO ══ -->
<div id="screen-game">
  <div id="sv-container">
    <iframe id="sv-iframe" allowfullscreen></iframe>
  </div>

  <div id="hud-top">
    <div class="hud-pill" id="timer-pill">2:00</div>
    <div class="hud-pill" id="round-info">Local <strong id="round-num">1</strong> de <strong id="round-total">5</strong></div>
    <div class="hud-pill" style="flex:1" id="current-group-hud">Grupo atual: <strong id="current-group-name">—</strong></div>
    <div class="hud-pill" id="scores-pill" title="Pontuação acumulada">📊 Placar</div>
  </div>

  <div id="minimap-hint">🗺 Marque sua resposta no mapa</div>
  <div id="minimap-wrap">
    <div id="minimap"></div>
  </div>
  <button id="confirm-btn" onclick="confirmGuess()">✓ Confirmar local</button>
</div>

<!-- ══ RESULTADO DO ROUND ══ -->
<div id="screen-result" style="display:none; flex-direction:column;">
  <div class="result-card">
    <div class="result-location-name" id="res-location-name">—</div>
    <div class="result-country" id="res-location-country">—</div>
    <div id="result-map-mini"></div>
    <div class="result-groups-grid" id="res-groups-grid"></div>
    <button class="btn-next" id="btn-next" onclick="nextRound()">Próximo local →</button>
  </div>
</div>

<!-- ══ RESULTADO FINAL ══ -->
<div id="screen-final" style="display:none; flex-direction:column; align-items:center;">
  <h1>🏆 Resultado Final</h1>
  <p class="subtitle">Menor distância total vence!</p>
  <div class="podium" id="final-podium"></div>
  <button class="btn-restart" onclick="restartGame()">↺ Jogar novamente</button>
</div>

<script>
// ════════════════════════════════════════════

//   OU deixe em branco para usar coordenadas
// ════════════════════════════════════════════

  { name: "Cataratas do Iguaçu", country: "Brasil/Argentina 🇧🇷", lat: -25.6953, lng: -54.4367 },
  { name: "Buda em Bangkok", country: "Tailândia 🇹🇭", lat: 13.7467, lng: 100.4927 },
  { name: "Canal de Veneza", country: "Itália 🇮🇹", lat: 45.4408, lng: 12.3155 },

  { name: "Aeroporto de Hong Kong", country: "China (HK) 🇭🇰", lat: 22.3080, lng: 113.9185 },

  { name: "Forbidden City", country: "China 🇨🇳", lat: 39.9163, lng: 116.3972 },
  { name: "Uluru / Ayers Rock", country: "Austrália 🇦🇺", lat: -25.3444, lng: 131.0369 },
  { name: "Times Square", country: "EUA 🇺🇸", lat: 40.7580, lng: -73.9855 },
  { name: "Arco do Triunfo", country: "França 🇫🇷", lat: 48.8738, lng: 2.2950 },
  { name: "Museu Guggenheim Bilbao", country: "Espanha 🇪🇸", lat: 43.2687, lng: -2.9340 },
  { name: "Estádio de Wembley", country: "Reino Unido 🇬🇧", lat: 51.5560, lng: -0.2795 },
  { name: "Ópera de Viena", country: "Áustria 🇦🇹", lat: 48.2030, lng: 16.3689 },
  { name: "Ben Nevis", country: "Escócia 🇬🇧", lat: 56.7969, lng: -5.0035 },
  { name: "Golden Gate", country: "EUA 🇺🇸", lat: 37.8199, lng: -122.4783 },
  { name: "Mezquita de Córdoba", country: "Espanha 🇪🇸", lat: 37.8789, lng: -4.7794 },
];

// ════════════
//  ESTADO
// ════════════
const NUM_GROUPS = 5;
const NUM_ROUNDS = 5;
const ROUND_TIME = 120; // segundos

let groups = [];
let selectedLocations = [];
let currentRound = 0;
let currentGroupIdx = 0;
let timerInterval = null;
let timeLeft = ROUND_TIME;
let scores = []; // scores[groupIdx][roundIdx] = { distKm, guessLatLng }
let groupGuesses = {}; // guesses do round atual: { groupIdx: { lat, lng } }

let miniMap = null;
let guessMarker = null;
let resultMapInstance = null;
let audioCtx = null;

// ════════════
//  SETUP UI
// ════════════
function buildSetupUI() {
  const grid = document.getElementById('groups-grid');
  grid.innerHTML = '';
  for (let i = 0; i < NUM_GROUPS; i++) {
    const wrap = document.createElement('div');
    wrap.className = 'group-input-wrap';
    wrap.innerHTML = `<label>Grupo ${i+1}</label>
      <input type="text" id="g${i}" placeholder="Nome do grupo ${i+1}" maxlength="30">`;
    grid.appendChild(wrap);
  }
}

function startGame() {
  groups = [];
  for (let i = 0; i < NUM_GROUPS; i++) {
    const val = document.getElementById(`g${i}`).value.trim();
    groups.push(val || `Grupo ${i+1}`);
  }
  scores = groups.map(() => []);
  selectedLocations = shuffle([...LOCATIONS]).slice(0, NUM_ROUNDS);
  currentRound = 0;
  currentGroupIdx = 0;
  groupGuesses = {};

  document.getElementById('screen-setup').style.display = 'none';
  document.getElementById('screen-game').style.display = 'block';
  document.getElementById('round-total').textContent = NUM_ROUNDS;

  initMiniMap();
  loadRound();
}

// ════════════
//  MAPA (Leaflet)
// ════════════
function initMiniMap() {
  if (miniMap) { miniMap.remove(); miniMap = null; }
  miniMap = L.map('minimap', {
    zoomControl: false, attributionControl: false,
    doubleClickZoom: false
  }).setView([20, 0], 2);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18
  }).addTo(miniMap);
  miniMap.on('click', onMapClick);
  // expande no hover
  const wrap = document.getElementById('minimap-wrap');
  wrap.addEventListener('mouseenter', () => { wrap.classList.add('expanded'); setTimeout(() => miniMap.invalidateSize(), 310); });
  wrap.addEventListener('mouseleave', () => { wrap.classList.remove('expanded'); setTimeout(() => miniMap.invalidateSize(), 310); });
}

function onMapClick(e) {
  if (guessMarker) miniMap.removeLayer(guessMarker);
  guessMarker = L.circleMarker(e.latlng, {
    radius: 8, color: '#f5c842', fillColor: '#f5c842',
    fillOpacity: 0.9, weight: 2
  }).addTo(miniMap);
  document.getElementById('confirm-btn').style.display = 'block';
  document.getElementById('minimap-hint').style.opacity = '0';
}

// ════════════
//  ROUND
// ════════════
function loadRound() {
  const loc = selectedLocations[currentRound];
  document.getElementById('round-num').textContent = currentRound + 1;
  groupGuesses = {};
  currentGroupIdx = 0;
  showGroupTurn();
  loadStreetView(loc);
  startTimer();
}

function showGroupTurn() {
  document.getElementById('current-group-name').textContent = groups[currentGroupIdx];
  // remove marcação anterior do mapa
  if (guessMarker) { miniMap.removeLayer(guessMarker); guessMarker = null; }
  document.getElementById('confirm-btn').style.display = 'none';
  document.getElementById('minimap-hint').style.opacity = '1';
}

function loadStreetView(loc) {
  const iframe = document.getElementById('sv-iframe');
  // Google Street View Embed — sem necessidade de API key para uso básico
  const url = `https://www.google.com/maps/embed/v1/streetview?key=AIzaSyD-9tSrke72PouQMnMX-a7eZSW0jkFMBWY&location=${loc.lat},${loc.lng}&heading=0&pitch=0&fov=90`;
  iframe.src = url;
}

function startTimer() {
  clearInterval(timerInterval);
  timeLeft = ROUND_TIME;
  updateTimerDisplay();
  startAmbientMusic();
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerDisplay();
    playTickSound(timeLeft);
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      stopMusic();
      showRoundResult();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(timeLeft / 60);
  const s = timeLeft % 60;
  const pill = document.getElementById('timer-pill');
  pill.textContent = `${m}:${s.toString().padStart(2,'0')}`;
  pill.classList.toggle('urgent', timeLeft <= 30);
}

function confirmGuess() {
  if (!guessMarker) return;
  const { lat, lng } = guessMarker.getLatLng();
  groupGuesses[currentGroupIdx] = { lat, lng };

  if (currentGroupIdx < NUM_GROUPS - 1) {
    currentGroupIdx++;
    showGroupTurn();
  } else {
    // todos os grupos jogaram
    clearInterval(timerInterval);
    stopMusic();
    showRoundResult();
  }
}

// ════════════
//  RESULTADO ROUND
// ════════════
function showRoundResult() {
  const loc = selectedLocations[currentRound];
  document.getElementById('res-location-name').textContent = loc.name;
  document.getElementById('res-location-country').textContent = loc.country;

  // calcula distâncias
  const roundResults = groups.map((g, i) => {
    const guess = groupGuesses[i];
    if (!guess) return { group: g, idx: i, dist: null };
    const dist = haversine(loc.lat, loc.lng, guess.lat, guess.lng);
    scores[i].push(dist);
    return { group: g, idx: i, dist, guess };
  });

  // identifica vencedor do round
  const validResults = roundResults.filter(r => r.dist !== null);
  let minDist = validResults.length ? Math.min(...validResults.map(r => r.dist)) : null;

  // mapa de resultado
  const container = document.getElementById('result-map-mini');
  container.innerHTML = '';
  if (resultMapInstance) { resultMapInstance.remove(); resultMapInstance = null; }
  resultMapInstance = L.map(container, { zoomControl: false, attributionControl: false })
    .setView([loc.lat, loc.lng], 4);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(resultMapInstance);

  // marcador correto
  L.marker([loc.lat, loc.lng], {
    icon: L.divIcon({ html: '<div style="background:#22c55e;width:16px;height:16px;border-radius:50%;border:2px solid #fff"></div>', iconSize: [16,16], iconAnchor: [8,8] })
  }).addTo(resultMapInstance).bindPopup(`✅ ${loc.name}`).openPopup();

  // marcadores dos grupos
  const colors = ['#f5c842','#60a5fa','#f87171','#a78bfa','#34d399'];
  roundResults.forEach((r, i) => {
    if (!r.guess) return;
    L.polyline([[loc.lat, loc.lng], [r.guess.lat, r.guess.lng]], { color: colors[i], weight: 1.5, dashArray: '4 4' }).addTo(resultMapInstance);
    L.circleMarker([r.guess.lat, r.guess.lng], { radius: 7, color: colors[i], fillColor: colors[i], fillOpacity: 0.8, weight: 2 })
      .addTo(resultMapInstance).bindPopup(r.group);
  });

  // grid de resultados
  const grid = document.getElementById('res-groups-grid');
  grid.innerHTML = '';
  roundResults.forEach((r, i) => {
    const isWinner = r.dist !== null && r.dist === minDist;
    const card = document.createElement('div');
    card.className = 'result-group-card' + (isWinner ? ' winner' : '');
    card.innerHTML = `<div class="result-group-name">${r.group}</div>
      ${r.dist !== null
        ? `<div class="result-group-dist">${formatDist(r.dist)}</div>
           <div class="result-group-pts">${isWinner ? '🏆 Mais próximo!' : ''}</div>`
        : `<div class="no-guess">Sem marcação</div>`}`;
    grid.appendChild(card);
  });

  const isLast = currentRound >= NUM_ROUNDS - 1;
  document.getElementById('btn-next').textContent = isLast ? '🏁 Ver resultado final' : 'Próximo local →';

  document.getElementById('screen-result').style.display = 'flex';
  setTimeout(() => resultMapInstance.invalidateSize(), 100);
}

function nextRound() {
  document.getElementById('screen-result').style.display = 'none';
  currentRound++;
  if (currentRound >= NUM_ROUNDS) {
    showFinal();
  } else {
    loadRound();
  }
}

// ════════════
//  FINAL
// ════════════
function showFinal() {
  document.getElementById('screen-game').style.display = 'none';

  const totals = groups.map((g, i) => {
    const total = scores[i].reduce((a, b) => a + b, 0);
    return { group: g, total };
  }).sort((a, b) => a.total - b.total);

  const medals = ['🥇','🥈','🥉','4º','5º'];
  const classes = ['gold','silver','bronze','',''];
  const podium = document.getElementById('final-podium');
  podium.innerHTML = totals.map((t, i) => `
    <div class="podium-row ${classes[i]}">
      <span class="podium-rank">${medals[i]}</span>
      <span class="podium-name">${t.group}</span>
      <div>
        <div class="podium-total">${formatDist(t.total)}</div>
        <div class="podium-unit">distância total</div>
      </div>
    </div>`).join('');

  document.getElementById('screen-final').style.display = 'flex';
}

function restartGame() {
  document.getElementById('screen-final').style.display = 'none';
  document.getElementById('screen-setup').style.display = 'flex';
}

// ════════════
//  ÁUDIO (Web Audio API)
// ════════════
let gainNode = null;
let musicOscillators = [];
let isPlaying = false;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function startAmbientMusic() {
  stopMusic();
  isPlaying = true;
  const ctx = getAudioCtx();
  gainNode = ctx.createGain();
  gainNode.gain.setValueAtTime(0.04, ctx.currentTime);
  gainNode.connect(ctx.destination);

  // música de contagem: arpejo minimalista
  const notes = [261.63, 329.63, 392.00, 523.25]; // C4 E4 G4 C5
  let step = 0;
  function playStep() {
    if (!isPlaying) return;
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(notes[step % notes.length], ctx.currentTime);
    osc.connect(gainNode);
    osc.start();
    osc.stop(ctx.currentTime + 0.15);
    step++;
    setTimeout(playStep, 600);
  }
  playStep();
}

function stopMusic() {
  isPlaying = false;
  if (gainNode) {
    try { gainNode.gain.setValueAtTime(0, getAudioCtx().currentTime); } catch(e){}
    gainNode = null;
  }
}

function playTickSound(t) {
  if (t > 30) return;
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const g = ctx.createGain();
  osc.connect(g); g.connect(ctx.destination);
  osc.type = 'square';
  osc.frequency.setValueAtTime(t <= 10 ? 880 : 660, ctx.currentTime);
  g.gain.setValueAtTime(0.05, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
  osc.start(); osc.stop(ctx.currentTime + 0.08);
}

// ════════════
//  UTILITÁRIOS
// ════════════
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function formatDist(km) {
  if (km < 1) return `${Math.round(km * 1000)} m`;
  return `${Math.round(km).toLocaleString('pt-BR')} km`;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
